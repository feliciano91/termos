<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Assinatura</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

canvas{
    border:1px solid #ccc;
    width:100%;
    max-width:600px;
    height:200px;
    touch-action:none;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.salvar {
    background: green;
    color: white;
}

.limpar {
    background: gray;
    color: white;
}
</style>

</head>
<body>

<h2>Assine abaixo</h2>

<canvas id="canvas" width="600" height="200"></canvas>

<br>

<button class="limpar" onclick="limpar()">Limpar</button>
<button class="salvar" onclick="salvar()">Salvar Assinatura</button>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let desenhando = false;

function getPosicao(e){

    const rect = canvas.getBoundingClientRect();

    if(e.touches){
        return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top
        };
    }

    return {
        x: e.offsetX,
        y: e.offsetY
    };
}

function iniciar(){
    desenhando = true;
}

function parar(){
    desenhando = false;
    ctx.beginPath();
}

function desenhar(e){

    if(!desenhando) return;

    e.preventDefault();

    const pos = getPosicao(e);

    ctx.lineWidth = 2;
    ctx.lineCap = "round";

    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
}

/* COMPUTADOR */

canvas.addEventListener("mousedown", iniciar);
canvas.addEventListener("mouseup", parar);
canvas.addEventListener("mousemove", desenhar);

/* CELULAR */

canvas.addEventListener("touchstart", iniciar);
canvas.addEventListener("touchend", parar);
canvas.addEventListener("touchmove", desenhar);

function limpar() {
    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );
}

function salvar() {

    const assinatura = canvas.toDataURL("image/png");

    fetch("/salvar_assinatura/{{ item_id }}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            assinatura: assinatura
        })
    })
    .then(r => r.json())
    .then(r => {
        alert(r.mensagem);
        window.location.href = "/";
    });
}

</script>

</body>
</html>
